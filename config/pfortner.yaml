server:
  port: 3000
  upstream_relay: 'ws://127.0.0.1:8080'
  idle_timeout: 600
  x_forwarded_for: false

  shutdown:
    drain_timeout: 30
    force_after: 30

  connections:
    max: 200
    max_per_ip: 10

auth:
  enabled: false

pipelines:
  client:
    - policy: kind-filter
      config:
        mode: allow
        kinds: [0, 5, 7, 40, 42, 10002, 27235]
    - policy: accept

  server:
    - policy: accept
