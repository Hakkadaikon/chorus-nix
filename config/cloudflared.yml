tunnel: ${TUNNEL_ID}
credentials-file: /etc/cloudflared/${TUNNEL_ID}.json

ingress:
  - hostname: ${ADMIN_DOMAIN}
    service: http://127.0.0.1:3000
    originRequest:
      httpHostHeader: ${ADMIN_DOMAIN}
  - hostname: ${RELAY_DOMAIN}
    service: http://127.0.0.1:3000
    originRequest:
      httpHostHeader: ${RELAY_DOMAIN}
  - service: http_status:404
